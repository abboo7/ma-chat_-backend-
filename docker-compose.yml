name: ma-chat-api

services:
  postgres:
    image: postgres:16
    container_name: ma-chat-postgres
    environment:
      POSTGRES_DB: ma_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ma_chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ma_chat_postgres_data:
